name: Deploy to GitHub Pages

on:
  # 推送到主分支时自动部署
  push:
    branches: [main]
  # 允许在 Actions 页手动触发
  workflow_dispatch:

# 允许 GITHUB_TOKEN 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署，不取消进行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro (含 pagefind 搜索索引)
        # 显式注入构建期环境变量（PUBLIC_ 前缀会被 Astro 内联到前端）。
        # 无论你在仓库 Settings 里存为 Variables 还是 Secrets 都能生效（|| 取其一）。
        env:
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID || secrets.PUBLIC_GA_ID }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT || secrets.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO || secrets.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID || secrets.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY || secrets.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID || secrets.PUBLIC_GISCUS_CATEGORY_ID }}
          PUBLIC_GISCUS_LANG: ${{ vars.PUBLIC_GISCUS_LANG || secrets.PUBLIC_GISCUS_LANG }}
          PUBLIC_GSC_VERIFICATION: ${{ vars.PUBLIC_GSC_VERIFICATION || secrets.PUBLIC_GSC_VERIFICATION }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
