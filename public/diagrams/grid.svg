<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <rect x="40" y="40" width="400" height="220" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="56" y="64" font-size="14" fill="#1d4ed8">grid 容器（display: grid）</text>
  <g stroke="#93c5fd" stroke-width="1.5">
    <line x1="173" y1="74" x2="173" y2="256"/>
    <line x1="296" y1="74" x2="296" y2="256"/>
    <line x1="40" y1="147" x2="440" y2="147"/>
    <line x1="40" y1="220" x2="440" y2="220"/>
  </g>
  <rect x="173" y="74" width="223" height="146" fill="#bfdbfe" opacity="0.75"/>
  <text x="284" y="155" font-size="14" fill="#1e40af" text-anchor="middle">grid-area（跨列跨行）</text>
  <text x="40" y="288" font-size="13" fill="#64748b">竖向是列线 columns，横向是行线 rows，单元格由线划分</text>
</svg>
