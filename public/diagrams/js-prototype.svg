<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="16" fill="#ffffff"/>
  <text x="40" y="46" font-size="22" font-weight="700" fill="#0f172a">一张图看懂原型链</text>

  <!-- 实例对象 -->
  <rect x="60" y="90" width="200" height="90" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="120" font-size="15" font-weight="600" fill="#334155">实例 obj</text>
  <text x="80" y="146" font-size="13" fill="#64748b">自有属性: name</text>
  <text x="80" y="168" font-size="13" fill="#64748b">__proto__ →</text>

  <!-- 构造函数原型 -->
  <rect x="300" y="90" width="220" height="90" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="320" y="120" font-size="15" font-weight="600" fill="#1e40af">Person.prototype</text>
  <text x="320" y="146" font-size="13" fill="#475569">共享方法: sayHi()</text>
  <text x="320" y="168" font-size="13" fill="#64748b">__proto__ →</text>

  <!-- Object.prototype -->
  <rect x="560" y="90" width="160" height="90" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="575" y="120" font-size="14" font-weight="600" fill="#166534">Object.prototype</text>
  <text x="575" y="146" font-size="12" fill="#475569">toString() 等</text>
  <text x="575" y="168" font-size="12" fill="#64748b">__proto__ → null</text>

  <!-- 箭头 -->
  <line x1="260" y1="135" x2="298" y2="135" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="520" y1="135" x2="558" y2="135" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 读取查找说明 -->
  <rect x="60" y="230" width="640" height="120" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="80" y="262" font-size="15" font-weight="600" fill="#92400e">读取 obj.sayHi() 时发生了什么？</text>
  <text x="80" y="292" font-size="14" fill="#78350f">① 先在自己身上找 → 没有</text>
  <text x="80" y="318" font-size="14" fill="#78350f">② 顺着 __proto__ 去 Person.prototype 找 → 找到了，调用</text>
  <text x="80" y="344" font-size="14" fill="#78350f">③ 再没有就继续往上，直到 Object.prototype → null 为止</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="40" y="392" font-size="13" fill="#64748b">关键结论：属性找不到时，JS 会沿 __proto__ 一路向上找，这条链就是"原型链"。</text>
</svg>
